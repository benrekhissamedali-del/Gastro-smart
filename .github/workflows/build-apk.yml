name: 🚀 Build APK + AAB (Google Play)

on:
  push:
    branches:
      - claude/restaurant-management-app-GgH7o
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build signed APK & AAB
    runs-on: ubuntu-latest

    steps:
      # ── 1. Code ──────────────────────────────────────────────────
      - name: 📦 Checkout
        uses: actions/checkout@v4

      # ── 2. Java ──────────────────────────────────────────────────
      - name: ☕ Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Node ──────────────────────────────────────────────────
      - name: 🟢 Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # ── 4. Android SDK ───────────────────────────────────────────
      - name: 📱 Android SDK
        uses: android-actions/setup-android@v3

      - name: 🔧 SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      # ── 5. Web build ─────────────────────────────────────────────
      - name: 📥 npm ci
        run: npm ci

      - name: 🏗️ Vite build
        run: npm run build

      # ── 6. Capacitor ─────────────────────────────────────────────
      - name: ➕ Cap add android
        run: npx cap add android

      - name: 🔄 Cap sync
        run: npx cap sync android

      # ── 7. Keystore ──────────────────────────────────────────────
      - name: 🔑 Restore keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/gastrosmart.keystore

      # ── 8. Build debug APK (no signing needed) ───────────────────
      - name: 🔨 Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4g"

      # ── 9. Build release AAB (signed, for Google Play) ───────────
      - name: 🔏 Build signed release AAB
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        working-directory: android
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4g" \
            -Pandroid.injected.signing.store.file=$PWD/app/gastrosmart.keystore \
            -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      # ── 10. Build signed release APK ─────────────────────────────
      - name: 🔏 Build signed release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        working-directory: android
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4g" \
            -Pandroid.injected.signing.store.file=$PWD/app/gastrosmart.keystore \
            -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      # ── 11. Collect artifacts ─────────────────────────────────────
      - name: 📁 Collect outputs
        run: |
          mkdir -p output
          # Debug APK (always available)
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             output/GastroSmart-debug.apk || true
          # Release APK (when keystore configured)
          cp android/app/build/outputs/apk/release/app-release.apk \
             output/GastroSmart-release-signed.apk 2>/dev/null || true
          # AAB for Google Play (when keystore configured)
          cp android/app/build/outputs/bundle/release/app-release.aab \
             output/GastroSmart-GooglePlay.aab 2>/dev/null || true
          ls -lh output/

      # ── 12. Upload APK (debug — installable directly) ────────────
      - name: 📤 Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: GastroSmart-APK-debug
          path: output/GastroSmart-debug.apk
          retention-days: 30

      # ── 13. Upload release APK + AAB (when keystore set) ─────────
      - name: 📤 Upload release APK + AAB
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: GastroSmart-Release-GooglePlay
          path: |
            output/GastroSmart-release-signed.apk
            output/GastroSmart-GooglePlay.aab
          retention-days: 90

      # ── 14. Summary ───────────────────────────────────────────────
      - name: ✅ Summary
        run: |
          echo "## ✅ GastroSmart Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Fichier | Usage |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 GastroSmart-debug.apk | Test direct sur téléphone |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 GastroSmart-release-signed.apk | Partage / sideload |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏪 GastroSmart-GooglePlay.aab | **Upload Google Play** |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📱 App info" >> $GITHUB_STEP_SUMMARY
          echo "- ID: \`com.gastrosmart.app\`" >> $GITHUB_STEP_SUMMARY
          echo "- Android min: 5.1 (API 22)" >> $GITHUB_STEP_SUMMARY
          echo "- Compte démo: admin@gastrosmart.com / Admin123" >> $GITHUB_STEP_SUMMARY
