name: Build Android APK

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ─────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      # ── 3. Android SDK ─────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 4. Cache Gradle ─────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android-bluetooth/**/*.gradle*', 'android-bluetooth/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── 5. Permissions ──────────────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android-bluetooth/gradlew

      # ── 6. Decode keystore from secret ─────────────────────────────────────
      # KEYSTORE_BASE64 secret must be set in repository settings.
      # If absent, only the debug APK is built.
      - name: Decode keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android-bluetooth/release.jks
          echo "storeFile=release.jks"         >> android-bluetooth/keystore.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> android-bluetooth/keystore.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}"           >> android-bluetooth/keystore.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}"     >> android-bluetooth/keystore.properties

      # ── 7. Build DEBUG APK ──────────────────────────────────────────────────
      - name: Build Debug APK
        working-directory: android-bluetooth
        run: ./gradlew assembleDebug --no-daemon

      # ── 8. Build RELEASE APK (signed if keystore present) ──────────────────
      - name: Build Release APK
        working-directory: android-bluetooth
        run: ./gradlew assembleRelease --no-daemon

      # ── 9. Upload artifacts ─────────────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: gastrosmart-bluetooth-debug
          path: android-bluetooth/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: gastrosmart-bluetooth-release
          path: android-bluetooth/app/build/outputs/apk/release/*.apk
          retention-days: 30

      # ── 10. GitHub Release (main branch only) ──────────────────────────────
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "GastroSmart Bluetooth v1.0.${{ github.run_number }}"
          body: |
            ## APK Android — GastroSmart Bluetooth Control

            ### Téléchargement & Installation
            1. Télécharger **`gastrosmart-bluetooth-release.apk`** (signé) ou `debug.apk` (tests)
            2. Sur Android : **Paramètres → Sécurité → Installer des apps inconnues**
            3. Ouvrir le fichier APK

            ### Fonctionnalités
            - Scan BLE (Low Energy) et Bluetooth Classic
            - Connexion GATT (BLE) / SPP (HC-05, HC-06, Arduino…)
            - Contrôle universel : ON/OFF, Slider 0-100 %, commandes hex brutes
            - Compatible Android 6.0+ (API 23+), optimisé Android 14
          files: |
            android-bluetooth/app/build/outputs/apk/debug/*.apk
            android-bluetooth/app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
