name: Build Android APK

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:          # Allow manual trigger from GitHub UI

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ─────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      # ── 3. Android SDK ─────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 4. Cache Gradle ─────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android-bluetooth/**/*.gradle*', 'android-bluetooth/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 5. Permissions ──────────────────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x android-bluetooth/gradlew

      # ── 6. Build DEBUG APK ──────────────────────────────────────────────────
      - name: Build Debug APK
        working-directory: android-bluetooth
        run: ./gradlew assembleDebug --stacktrace

      # ── 7. Build RELEASE APK (unsigned) ────────────────────────────────────
      - name: Build Release APK (unsigned)
        working-directory: android-bluetooth
        run: ./gradlew assembleRelease --stacktrace

      # ── 8. Sign Release APK ─────────────────────────────────────────────────
      # Requires these GitHub Secrets:
      #   KEYSTORE_BASE64   - base64-encoded .jks file
      #   KEY_ALIAS         - alias name in the keystore
      #   KEY_PASSWORD      - alias password
      #   STORE_PASSWORD    - keystore password
      - name: Sign Release APK
        if: github.ref == 'refs/heads/main' && env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS:       ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:    ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD:  ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > /tmp/release.jks
          cd android-bluetooth
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=/tmp/release.jks \
            -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      # ── 9. Upload APK artifacts ─────────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: gastrosmart-bluetooth-debug
          path: android-bluetooth/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: gastrosmart-bluetooth-release
          path: android-bluetooth/app/build/outputs/apk/release/*.apk
          retention-days: 30

      # ── 10. Create GitHub Release on main ───────────────────────────────────
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "apk-${{ github.run_number }}"
          name: "GastroSmart Bluetooth v1.0.${{ github.run_number }}"
          body: |
            ## APK Android — GastroSmart Bluetooth Control

            ### Installation
            1. Télécharger `gastrosmart-bluetooth-debug.apk` (pour les tests)
            2. Sur l'appareil Android : `Paramètres → Sécurité → Sources inconnues`
            3. Ouvrir le fichier APK pour installer

            ### Fonctionnalités
            - Scan BLE et Bluetooth Classic
            - Connexion GATT (BLE) / SPP (HC-05, HC-06)
            - Contrôle ON/OFF, slider 0-100 %, commandes hex brutes
            - Compatible Android 6.0+ (API 23+)
          files: |
            android-bluetooth/app/build/outputs/apk/debug/*.apk
            android-bluetooth/app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
