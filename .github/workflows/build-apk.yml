name: Build Android APK

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android-bluetooth/**/*.gradle*', 'android-bluetooth/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x android-bluetooth/gradlew

      # Decode keystore — shell conditional avoids forbidden secret in if:
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android-bluetooth/release.jks
            printf 'storeFile=release.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
              "$STORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD" \
              > android-bluetooth/keystore.properties
            echo "Keystore decoded successfully."
          else
            echo "No KEYSTORE_BASE64 secret — release APK will be unsigned."
          fi

      - name: Build Debug APK
        working-directory: android-bluetooth
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Release APK
        working-directory: android-bluetooth
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: gastrosmart-bluetooth-debug
          path: android-bluetooth/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: gastrosmart-bluetooth-release
          path: android-bluetooth/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "GastroSmart Bluetooth v1.0.${{ github.run_number }}"
          body: |
            ## APK Android — GastroSmart Bluetooth Control

            ### Installation
            1. Telecharger **`gastrosmart-bluetooth-release.apk`** (signe) ou `debug.apk` (tests)
            2. Sur Android : **Parametres -> Securite -> Installer des apps inconnues**
            3. Ouvrir le fichier APK

            ### Fonctionnalites
            - Scan BLE et Bluetooth Classic
            - Connexion GATT (BLE) / SPP (HC-05, HC-06, Arduino)
            - Controle universel : ON/OFF, Slider 0-100%, commandes hex brutes
            - Compatible Android 6.0+ (API 23+)
          files: |
            android-bluetooth/app/build/outputs/apk/debug/*.apk
            android-bluetooth/app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
