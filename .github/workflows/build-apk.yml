name: 🔨 Build Android APK

on:
  push:
    branches: [claude/habit-tracker-app-1oZiv, main]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Add Android platform
        run: npx cap add android
        env:
          CI: true

      - name: Configure Android SDK path
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Sync Capacitor with web build
        run: npx cap sync android

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses 2>/dev/null || true

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HabitFlow-debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Show APK info
        run: |
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          echo "✅ APK built successfully"
          echo "📦 Size: $(du -sh $APK | cut -f1)"
