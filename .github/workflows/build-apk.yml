name: 🔨 Build Android APK

on:
  push:
    branches:
      - claude/restaurant-management-app-GgH7o
      - main
  workflow_dispatch:

jobs:
  build-apk:
    name: Build GastroSmart APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Code ──────────────────────────────────────────────
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      # ── 2. Java ──────────────────────────────────────────────
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Node ──────────────────────────────────────────────
      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # ── 4. Android SDK ───────────────────────────────────────
      - name: 📱 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 🔧 Install Android SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      # ── 5. Web build ─────────────────────────────────────────
      - name: 📥 Install npm dependencies
        run: npm ci

      - name: 🏗️ Build web app (Vite)
        run: npm run build

      # ── 6. Capacitor ─────────────────────────────────────────
      - name: ➕ Add Capacitor Android platform
        run: npx cap add android

      - name: 🔄 Sync Capacitor (copy web assets)
        run: npx cap sync android

      # ── 7. Gradle build ──────────────────────────────────────
      - name: 🔨 Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      # ── 8. Rename & upload ────────────────────────────────────
      - name: 📝 Rename APK
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             output/GastroSmart-v1.0.0.apk

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GastroSmart-APK
          path: output/GastroSmart-v1.0.0.apk
          retention-days: 30
          if-no-files-found: error

      # ── 9. Summary ───────────────────────────────────────────
      - name: ✅ Build summary
        run: |
          SIZE=$(du -sh output/GastroSmart-v1.0.0.apk | cut -f1)
          echo "### ✅ GastroSmart APK built successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Info | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 File | GastroSmart-v1.0.0.apk |" >> $GITHUB_STEP_SUMMARY
          echo "| 💾 Size | $SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| 🤖 Android | 5.1+ (API 22+) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⬇️ Download from the **Artifacts** section above." >> $GITHUB_STEP_SUMMARY
          echo "📧 Compte démo: admin@gastrosmart.com / Admin123" >> $GITHUB_STEP_SUMMARY
